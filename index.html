<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>歌練習ノート</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#faf7f1">
<style>
:root{
  --bg:#faf7f1; --card:#ffffff; --ink:#33302b; --sub:#8a8377;
  --accent:#e0562e; --accent-soft:#fbe9e2; --line:#e8e2d8;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;font-size:16px;
  overscroll-behavior:none;}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
input,textarea{font-family:inherit;font-size:16px;color:var(--ink);}
.hidden{display:none!important;}

/* ===== ヘッダー ===== */
header{position:sticky;top:0;z-index:20;background:rgba(250,247,241,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:8px;padding:10px 12px;min-height:52px;}
header h1{font-size:17px;margin:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.iconbtn{width:40px;height:40px;border-radius:12px;font-size:20px;display:flex;
  align-items:center;justify-content:center;flex:none;}
.iconbtn:active{background:var(--accent-soft);}
.pillbtn{padding:8px 14px;border-radius:20px;font-size:14px;font-weight:600;flex:none;}
.pillbtn.on{background:var(--accent);color:#fff;}
.pillbtn.off{background:#eee7dc;color:var(--ink);}

/* ===== 曲一覧 ===== */
#homeView{padding:14px 14px calc(90px + var(--safe-b));}
.songcard{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.songcard:active{transform:scale(.985);}
.songcard .t{font-size:17px;font-weight:700;}
.songcard .a{font-size:13px;color:var(--sub);margin-top:2px;}
.songcard .d{font-size:11px;color:var(--sub);margin-top:6px;}
#emptyMsg{text-align:center;color:var(--sub);padding:60px 20px;line-height:1.9;font-size:14px;}
#fab{position:fixed;right:18px;bottom:calc(18px + var(--safe-b));width:58px;height:58px;
  border-radius:50%;background:var(--accent);color:#fff;font-size:30px;z-index:15;
  box-shadow:0 4px 14px rgba(224,86,46,.4);display:flex;align-items:center;justify-content:center;}

/* ===== 曲画面(手書き) ===== */
#songScreen{position:fixed;inset:0;display:flex;flex-direction:column;background:#f2ede4;}
#songScreen header{position:relative;}
/* ツールバー */
#toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(250,247,241,.95);
  border-bottom:1px solid var(--line);overflow-x:auto;flex:none;}
.tool{min-width:44px;height:44px;border-radius:12px;font-size:19px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex:none;background:#f0ebe2;position:relative;}
.tool small{font-size:9px;color:var(--sub);line-height:1;margin-top:1px;}
.tool.sel{background:var(--accent);color:#fff;}
.tool.sel small{color:#ffd9c9;}
.tb-sep{width:1px;height:30px;background:var(--line);flex:none;margin:0 2px;}
.swatch{width:34px;height:34px;border-radius:50%;flex:none;border:2.5px solid transparent;padding:0;}
.swatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset;}
/* ステージ */
#stage{flex:1;overflow:hidden;position:relative;touch-action:none;}
#paper{position:absolute;left:0;top:0;transform-origin:0 0;background:#fff;
  box-shadow:0 2px 18px rgba(60,45,20,.18);border-radius:4px;}
#paperSvg{display:block;}
#paperSvg text{font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;fill:#2b2823;
  user-select:none;-webkit-user-select:none;}
#zoomHint{position:absolute;left:50%;bottom:calc(14px + var(--safe-b));transform:translateX(-50%);
  background:rgba(40,35,28,.75);color:#fff;font-size:12px;padding:7px 14px;border-radius:16px;
  pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .3s;}
#zoomHint.show{opacity:1;}

/* ===== モーダル共通 ===== */
.modal{position:fixed;inset:0;z-index:40;background:rgba(40,35,28,.45);
  display:flex;align-items:flex-end;justify-content:center;}
.modal .panel{background:#fff;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;padding:18px 18px calc(18px + var(--safe-b));}
.panel h2{margin:0 0 14px;font-size:18px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600;}
.field input[type=text],.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;
  padding:10px 12px;background:#fffdf8;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
#lyricsInput{min-height:180px;resize:vertical;line-height:1.7;}
.rowbtns{display:flex;gap:8px;margin-top:14px;}
.rowbtns button{flex:1;padding:13px 0;border-radius:12px;font-size:15px;font-weight:600;}
.btn-pri{background:var(--accent);color:#fff;}
.btn-sec{background:#f0ebe2;}
#searchResults{margin-top:10px;}
.result{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fffdf8;}
.result:active{background:var(--accent-soft);}
.result .rt{font-weight:700;font-size:14px;}
.result .ra{font-size:12px;color:var(--sub);}
.searchstatus{font-size:13px;color:var(--sub);padding:8px 2px;}
.menu-item{display:block;width:100%;text-align:left;padding:15px 6px;font-size:16px;
  border-bottom:1px solid var(--line);}
.menu-item:last-child{border-bottom:none;}
.menu-item.danger{color:#c0392b;}
/* トースト */
#toast{position:fixed;left:50%;bottom:calc(100px + var(--safe-b));transform:translateX(-50%);
  background:rgba(40,35,28,.9);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;
  z-index:60;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ============ ホーム(曲一覧) ============ -->
<div id="homeScreen">
  <header>
    <h1>🎤 歌練習ノート</h1>
    <button class="iconbtn" id="homeMenuBtn">⋯</button>
  </header>
  <div id="homeView"></div>
  <button id="fab">＋</button>
</div>

<!-- ============ 曲画面(手書き) ============ -->
<div id="songScreen" class="hidden">
  <header>
    <button class="iconbtn" id="backBtn">‹</button>
    <h1 id="songTitle"></h1>
    <button class="pillbtn off" id="modeToggle">👁 ビュー</button>
    <button class="iconbtn" id="songMenuBtn">⋯</button>
  </header>
  <div id="toolbar"></div>
  <div id="stage">
    <div id="paper"><svg id="paperSvg" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div id="zoomHint">2本指で移動・ピンチで拡大 / 1本指で書く</div>
  </div>
</div>

<!-- ============ 曲追加/編集モーダル ============ -->
<div id="addModal" class="modal hidden">
  <div class="panel">
    <h2 id="addTitle">曲を追加</h2>
    <div class="field"><label>曲名</label><input type="text" id="inTitle" placeholder="曲名"></div>
    <div class="field"><label>アーティスト(任意)</label><input type="text" id="inArtist" placeholder="アーティスト名"></div>
    <div class="rowbtns" id="fetchRow">
      <button class="btn-sec" id="btnSearch">🔍 歌詞を自動検索</button>
      <button class="btn-sec" id="btnOpenSite">🌐 歌詞サイトで探す</button>
    </div>
    <div id="searchResults"></div>
    <div class="field" style="margin-top:12px"><label>歌詞</label>
      <textarea id="lyricsInput" placeholder="ここに歌詞が入ります(手でペーストしてもOK)"></textarea>
    </div>
    <div class="rowbtns">
      <button class="btn-sec" id="addCancel">キャンセル</button>
      <button class="btn-pri" id="addSave">保存</button>
    </div>
  </div>
</div>

<!-- ============ メニュー(ホーム) ============ -->
<div id="homeMenu" class="modal hidden">
  <div class="panel">
    <h2>メニュー</h2>
    <button class="menu-item" id="miQR">📱 スマホで開く(QRコード)</button>
    <button class="menu-item" id="miExport">💾 バックアップを書き出す</button>
    <button class="menu-item" id="miImport">📂 バックアップを読み込む</button>
    <button class="menu-item" id="homeMenuClose">閉じる</button>
    <input type="file" id="importFile" accept=".json" class="hidden">
  </div>
</div>

<!-- ============ メニュー(曲) ============ -->
<div id="songMenu" class="modal hidden">
  <div class="panel">
    <h2 id="songMenuTitle"></h2>
    <button class="menu-item" id="miEditInfo">✏️ 曲名・アーティストを変更</button>
    <button class="menu-item" id="miEditLyrics">📝 歌詞を編集し直す(手書きの位置がズレることがあります)</button>
    <button class="menu-item danger" id="miClearInk">🧽 この曲の手書きを全部消す</button>
    <button class="menu-item danger" id="miDeleteSong">🗑 この曲を削除</button>
    <button class="menu-item" id="songMenuClose">閉じる</button>
  </div>
</div>

<!-- ============ QRモーダル ============ -->
<div id="qrModal" class="modal hidden">
  <div class="panel">
    <h2>📱 スマホで開く</h2>
    <div id="qrBody" style="text-align:center;padding:10px 0;">読み込み中…</div>
    <div style="font-size:13px;color:var(--sub);line-height:1.8;">
      公開版はいつでも → <b>fukufukurowl-lgtm.github.io/utareno</b>
    </div>
    <div class="rowbtns"><button class="btn-sec" id="qrClose">閉じる</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
/* ================= 紙のレイアウト定数(全端末で同一・変更禁止) ================= */
const PAPER_W = 1000;      // 紙の論理幅
const MARGIN  = 46;
const FS      = 42;        // 歌詞フォントサイズ
const LH      = 110;       // 行送り(書き込み余白を含む)
const FONTS   = '"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif';

/* ================= ツール定義 ================= */
const PEN_COLORS    = ["#1a56c9","#d92b2b","#222222","#0a8f3c"];
const MARKER_COLORS = ["#ff5ec4","#35d461","#ffd83d","#ffab4a","#4db3ff"];
const TOOLS = [
  {id:"pen",    icon:"✒️", label:"ペン",   w:4},
  {id:"fat",    icon:"🖊️", label:"太",     w:8},
  {id:"marker", icon:"🖍️", label:"マーカー", w:30},
  {id:"eraser", icon:"◻️", label:"消し",   w:0},
];

/* ================= IndexedDB ================= */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open("utareno", 1);
    rq.onupgradeneeded = e=>{
      const d = e.target.result;
      d.createObjectStore("songs", {keyPath:"id"});
      d.createObjectStore("meta", {keyPath:"key"});
    };
    rq.onsuccess = e=>{db=e.target.result; res();};
    rq.onerror = ()=>rej(rq.error);
  });
}
const tx = (s,m)=>db.transaction(s,m).objectStore(s);
const idbAll = s=>new Promise((res,rej)=>{const r=tx(s,"readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});
const idbPut = (s,v)=>new Promise((res,rej)=>{const r=tx(s,"readwrite").put(v); r.onsuccess=res; r.onerror=()=>rej(r.error);});
const idbDel = (s,k)=>new Promise((res,rej)=>{const r=tx(s,"readwrite").delete(k); r.onsuccess=res; r.onerror=()=>rej(r.error);});
const idbGet = (s,k)=>new Promise((res,rej)=>{const r=tx(s,"readonly").get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});

/* ================= 状態 ================= */
let songs=[], cur=null;
let editMode=true;                    // true=手書き, false=ビュー
let tool="pen", penColor=PEN_COLORS[0], markerColor=MARKER_COLORS[0];
let fingerDraws=true;                 // false=Apple Pencil専用(指はスクロール)
let pencilPrefSet=false;              // ユーザーが手動で切り替えたか
let view={scale:1, tx:0, ty:0};       // 紙の表示変換
let undoStack=[];
let addModalMode="new";
const $ = id=>document.getElementById(id);

/* ================= ユーティリティ ================= */
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove("show"),1800);
}
const fmtDate = ts=>{const d=new Date(ts);return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;};
/* 旧データ(v1: lines/segments)→ text へ移行 */
function migrate(s){
  if(s.text===undefined && Array.isArray(s.lines)){
    s.text = s.lines.map(l=>l.blank?"":l.segments.map(x=>x.text).join("")).join("\n");
    delete s.lines;
  }
  if(!Array.isArray(s.ink)) s.ink=[];
  return s;
}
let saveTm=null;
function scheduleSave(){
  clearTimeout(saveTm);
  saveTm=setTimeout(async()=>{
    if(!cur) return;
    cur.updatedAt=Date.now();
    await idbPut("songs",cur);
  },700);
}
async function saveNow(){
  clearTimeout(saveTm);
  if(!cur) return;
  cur.updatedAt=Date.now();
  await idbPut("songs",cur);
}

/* ================= ホーム ================= */
function renderHome(){
  const v=$("homeView"); v.innerHTML="";
  const sorted=[...songs].sort((a,b)=>b.updatedAt-a.updatedAt);
  if(sorted.length===0){
    v.innerHTML=`<div id="emptyMsg">まだ曲がありません。<br>右下の＋ボタンから最初の曲を追加してね 🎵</div>`;
    return;
  }
  for(const s of sorted){
    const c=document.createElement("div");
    c.className="songcard";
    c.innerHTML=`<div class="t"></div><div class="a"></div><div class="d"></div>`;
    c.querySelector(".t").textContent=s.title;
    c.querySelector(".a").textContent=s.artist||"";
    c.querySelector(".d").textContent="更新: "+fmtDate(s.updatedAt);
    c.onclick=()=>openSong(s.id);
    v.appendChild(c);
  }
}

/* ================= 紙のレイアウト ================= */
/* 全角=FS, 半角=FS*0.52 のグリッドで機種によらず同じ配置にする */
const isHalf = ch=>/[\x20-\x7E｡-ﾟ]/.test(ch);
function layoutPaper(text){
  const rows=[]; let y=MARGIN+FS;
  for(const raw of text.replace(/\r/g,"").split("\n")){
    if(raw.trim()===""){ y+=LH*0.45; continue; }
    let x=MARGIN, chars=[];
    for(const ch of [...raw]){
      const w=isHalf(ch)?FS*0.52:FS;
      // 空白は描画せず幅だけ進める(SVGのtext空白折りたたみでx列がズレるのを防ぐ)
      if(ch===" "||ch==="　"||ch==="\t"){ x+=w; continue; }
      if(x+w>PAPER_W-MARGIN && chars.length){ rows.push({chars,y}); y+=LH; x=MARGIN; chars=[]; }
      chars.push({ch,x}); x+=w;
    }
    rows.push({chars,y}); y+=LH;
  }
  return {rows, height:Math.max(y+MARGIN, 600)};
}

/* ================= 紙+インクの描画 ================= */
let paperH=600;
function renderPaper(){
  const svg=$("paperSvg");
  const {rows,height}=layoutPaper(cur.text||"");
  paperH=height;
  svg.setAttribute("width",PAPER_W);
  svg.setAttribute("height",height);
  svg.setAttribute("viewBox",`0 0 ${PAPER_W} ${height}`);
  $("paper").style.width=PAPER_W+"px";
  $("paper").style.height=height+"px";
  let t=`<g id="textLayer">`;
  for(const r of rows){
    const xs=r.chars.map(c=>Math.round(c.x)).join(" ");
    const str=r.chars.map(c=>c.ch).join("")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    t+=`<text x="${xs}" y="${r.y}" font-size="${FS}" font-family='${FONTS}' fill="#2b2823">${str}</text>`;
  }
  t+=`</g><g id="inkLayer"></g><g id="liveLayer"></g>`;
  svg.innerHTML=t;
  renderInk();
}
function strokePath(s){
  const p=s.pts;
  if(p.length<2) return `M${p[0][0]} ${p[0][1]} l0.1 0`;
  let d=`M${p[0][0]} ${p[0][1]}`;
  for(let i=1;i<p.length-1;i++){
    const mx=(p[i][0]+p[i+1][0])/2, my=(p[i][1]+p[i+1][1])/2;
    d+=` Q${p[i][0]} ${p[i][1]} ${mx} ${my}`;
  }
  const l=p[p.length-1];
  d+=` L${l[0]} ${l[1]}`;
  return d;
}
/* 筆圧が記録されているペン線か(Apple Pencil) */
function hasPressure(s){
  if(s.t!=="pen") return false;
  let mn=1, mx=0;
  for(const p of s.pts){
    if(p[2]===undefined) return false;
    mn=Math.min(mn,p[2]); mx=Math.max(mx,p[2]);
  }
  return (mx-mn)>0.04;
}
/* 折れ線を中点二次ベジェでなめらかな曲線パスにする(先頭のM以降を返す) */
function polyQ(P){
  const f=v=>v.toFixed(1);
  if(P.length<3){
    return P.slice(1).map(p=>`L${f(p[0])} ${f(p[1])}`).join("");
  }
  let d="";
  for(let i=1;i<P.length-1;i++){
    const mx=(P[i][0]+P[i+1][0])/2, my=(P[i][1]+P[i+1][1])/2;
    d+=`Q${f(P[i][0])} ${f(P[i][1])} ${f(mx)} ${f(my)}`;
  }
  const l=P[P.length-1];
  d+=`L${f(l[0])} ${f(l[1])}`;
  return d;
}
/* 筆圧で太さが変わるリボン(塗りつぶしパス) */
function ribbonPath(s){
  const pts=s.pts;
  if(pts.length<2) return strokePath(s);
  let rs=pts.map(p=>{
    const pr=p[2]!==undefined?p[2]:0.5;
    return Math.max(0.7, s.w/2*(0.35+1.3*pr));
  });
  // 半径を2回ならして太さのデコボコを消す
  for(let pass=0;pass<2;pass++){
    const t=rs.slice();
    for(let i=1;i<rs.length-1;i++) rs[i]=(t[i-1]+2*t[i]+t[i+1])/4;
  }
  const L=[], R=[];
  for(let i=0;i<pts.length;i++){
    const a=pts[Math.max(0,i-1)], b=pts[Math.min(pts.length-1,i+1)];
    let dx=b[0]-a[0], dy=b[1]-a[1];
    const len=Math.hypot(dx,dy)||1; dx/=len; dy/=len;
    L.push([pts[i][0]-dy*rs[i], pts[i][1]+dx*rs[i]]);
    R.push([pts[i][0]+dy*rs[i], pts[i][1]-dx*rs[i]]);
  }
  R.reverse();
  const f=v=>v.toFixed(1);
  const rl=rs[rs.length-1];
  let d=`M${f(L[0][0])} ${f(L[0][1])}`;
  d+=polyQ(L);
  d+=`A${f(rl)} ${f(rl)} 0 0 1 ${f(R[0][0])} ${f(R[0][1])}`;
  d+=polyQ(R);
  d+=`A${f(rs[0])} ${f(rs[0])} 0 0 1 ${f(L[0][0])} ${f(L[0][1])}Z`;
  return d;
}
function strokeEl(s){
  const el=document.createElementNS("http://www.w3.org/2000/svg","path");
  if(hasPressure(s)){
    el.setAttribute("d",ribbonPath(s));
    el.setAttribute("fill",s.c);
    el.setAttribute("stroke","none");
    return el;
  }
  el.setAttribute("d",strokePath(s));
  el.setAttribute("fill","none");
  el.setAttribute("stroke",s.c);
  el.setAttribute("stroke-width",s.w);
  el.setAttribute("stroke-linecap","round");
  el.setAttribute("stroke-linejoin","round");
  if(s.t==="marker"){ el.setAttribute("opacity","0.42"); el.style.mixBlendMode="multiply"; }
  return el;
}
function renderInk(){
  const layer=$("paperSvg").querySelector("#inkLayer");
  if(!layer) return;
  layer.innerHTML="";
  for(const s of cur.ink) layer.appendChild(strokeEl(s));
}

/* ================= 表示変換(パン/ズーム) ================= */
function applyView(){
  const p=$("paper");
  p.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
}
function fitPaper(){
  const st=$("stage").getBoundingClientRect();
  view.scale=(st.width-16)/PAPER_W;
  view.tx=8; view.ty=8;
  applyView();
}
function clampView(){
  const st=$("stage").getBoundingClientRect();
  view.scale=Math.min(Math.max(view.scale, st.width/PAPER_W*0.7), 6);
  const w=PAPER_W*view.scale, h=paperH*view.scale;
  view.tx=Math.min(Math.max(view.tx, st.width-w-40), 40);
  if(w<st.width) view.tx=(st.width-w)/2;
  view.ty=Math.min(Math.max(view.ty, st.height-h-40), 40);
  if(h<st.height-80) view.ty=8;
}
function toPaper(cx,cy){
  const st=$("stage").getBoundingClientRect();
  return [ (cx-st.left-view.tx)/view.scale, (cy-st.top-view.ty)/view.scale ];
}

/* ================= 入力(描画・パン・ピンチ) =================
   Apple Pencil最適化:
   - ペン(pointerType:"pen")は常に描く。指はfingerDraws=falseならスクロール/ピンチ専用
   - ペン使用中は指ジェスチャを無効化(パームリジェクション)
   - 筆圧を記録([x,y,p])、coalesced eventsで高密度サンプリング */
const touchPts=new Map();
let stroke=null, liveEl=null, liveRibbon=false, drawPid=null, erasePid=null;
let gesture=null, erased=[];

function startPanFrom(x,y){ gesture={mode:"pan", x, y, tx:view.tx, ty:view.ty, started:false}; }
function startPinch(){
  const pts=[...touchPts.values()];
  gesture={mode:"pinch",
    d:Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y),
    mx:(pts[0].x+pts[1].x)/2, my:(pts[0].y+pts[1].y)/2,
    scale:view.scale, tx:view.tx, ty:view.ty};
}
function addPoint(ev, isPen){
  let [x,y]=toPaper(ev.clientX,ev.clientY);
  const last=stroke.pts[stroke.pts.length-1];
  if(Math.hypot(x-last[0],y-last[1]) <= 1.2) return;
  // 位置を軽くならす(手ブレ・センサノイズ対策)
  x=last[0]*0.22+x*0.78;
  y=last[1]*0.22+y*0.78;
  const pt=[Math.round(x*10)/10, Math.round(y*10)/10];
  if(isPen){
    const prev=stroke._lp!==undefined?stroke._lp:ev.pressure;
    const p=prev*0.78+ev.pressure*0.22;
    stroke._lp=p;
    pt.push(Math.round(p*100)/100);
  }
  stroke.pts.push(pt);
}
function initStage(){
  const st=$("stage");
  st.addEventListener("pointerdown",e=>{
    try{ st.setPointerCapture(e.pointerId); }catch(_){}
    const isPen=e.pointerType==="pen";
    // Apple Pencil初検出 → 指をスクロール専用に自動切替
    if(isPen && fingerDraws && !pencilPrefSet){
      fingerDraws=false; pencilPrefSet=true;
      idbPut("meta",{key:"pencil", value:{fingerDraws:false}});
      renderToolbar();
      toast("Apple Pencil検出: 指はスクロール専用になりました");
    }
    const drawer = editMode && (isPen || e.pointerType==="mouse" || fingerDraws);
    if(!drawer){
      // 指(またはビュー中の全ポインタ)=ジェスチャ
      touchPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(touchPts.size===1) startPanFrom(e.clientX,e.clientY);
      else if(touchPts.size===2) startPinch();
      return;
    }
    // fingerDraws時の指: 2本目が来たら描きかけを捨ててピンチ
    if(!isPen && e.pointerType!=="mouse"){
      touchPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(touchPts.size===2){
        if(stroke){ liveEl.remove(); stroke=null; liveEl=null; drawPid=null; }
        if(erasePid!==null){ erasePid=null; erased=[]; }
        startPinch();
        return;
      }
    }
    if(drawPid!==null || erasePid!==null) return;
    if(tool==="eraser"){
      erasePid=e.pointerId; erased=[];
      eraseAt(e.clientX,e.clientY);
      return;
    }
    const def = tool==="marker"
      ? {t:"marker", c:markerColor, w:30}
      : {t:"pen", c:penColor, w: tool==="fat"?8:4};
    const [x,y]=toPaper(e.clientX,e.clientY);
    stroke={...def, pts:[[Math.round(x*10)/10, Math.round(y*10)/10]]};
    if(isPen && def.t==="pen"){
      stroke._lp=e.pressure;
      stroke.pts[0].push(Math.round(e.pressure*100)/100);
    }
    drawPid=e.pointerId;
    liveRibbon = isPen && def.t==="pen";
    liveEl=document.createElementNS("http://www.w3.org/2000/svg","path");
    if(liveRibbon){
      liveEl.setAttribute("fill",stroke.c);
      liveEl.setAttribute("stroke","none");
    }else{
      liveEl.setAttribute("fill","none");
      liveEl.setAttribute("stroke",stroke.c);
      liveEl.setAttribute("stroke-width",stroke.w);
      liveEl.setAttribute("stroke-linecap","round");
      liveEl.setAttribute("stroke-linejoin","round");
      if(stroke.t==="marker"){ liveEl.setAttribute("opacity","0.42"); liveEl.style.mixBlendMode="multiply"; }
    }
    liveEl.setAttribute("d",strokePath(stroke));
    $("paperSvg").querySelector("#liveLayer").appendChild(liveEl);
  });
  st.addEventListener("pointermove",e=>{
    if(stroke && e.pointerId===drawPid){
      let evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [];
      if(!evs.length) evs=[e];
      const isPen = e.pointerType==="pen" && stroke.t==="pen";
      for(const ev of evs) addPoint(ev,isPen);
      liveEl.setAttribute("d", liveRibbon ? ribbonPath(stroke) : strokePath(stroke));
      return;
    }
    if(e.pointerId===erasePid){ eraseAt(e.clientX,e.clientY); return; }
    if(!touchPts.has(e.pointerId)) return;
    touchPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    // ペンで描いている最中は指ジェスチャ無効(手のひら対策)
    if(stroke || erasePid!==null) return;
    if(gesture && gesture.mode==="pan" && touchPts.size===1){
      if(!gesture.started && Math.hypot(e.clientX-gesture.x, e.clientY-gesture.y)<8) return;
      gesture.started=true;
      view.tx=gesture.tx+(e.clientX-gesture.x);
      view.ty=gesture.ty+(e.clientY-gesture.y);
      clampView(); applyView();
    }else if(gesture && gesture.mode==="pinch" && touchPts.size===2){
      const pts=[...touchPts.values()];
      const d=Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      const mx=(pts[0].x+pts[1].x)/2, my=(pts[0].y+pts[1].y)/2;
      const k=d/gesture.d;
      view.scale=gesture.scale*k;
      const stR=$("stage").getBoundingClientRect();
      view.tx=mx-stR.left-((gesture.mx-stR.left-gesture.tx)*k);
      view.ty=my-stR.top-((gesture.my-stR.top-gesture.ty)*k);
      clampView(); applyView();
    }
  });
  const up=async e=>{
    if(e.pointerId===drawPid && stroke){
      delete stroke._lp;
      cur.ink.push(stroke);
      liveEl.remove();
      $("paperSvg").querySelector("#inkLayer").appendChild(strokeEl(stroke));
      undoStack.push({type:"add", stroke});
      if(undoStack.length>80) undoStack.shift();
      scheduleSave();
      stroke=null; liveEl=null; drawPid=null;
    }
    if(e.pointerId===erasePid){
      erasePid=null;
      if(erased.length){
        undoStack.push({type:"del", strokes:erased});
        erased=[];
        scheduleSave();
      }
    }
    if(touchPts.delete(e.pointerId)){
      if(touchPts.size===1){
        const p=[...touchPts.values()][0];
        startPanFrom(p.x,p.y);
      }else if(touchPts.size===0){
        gesture=null;
      }
    }
  };
  st.addEventListener("pointerup",up);
  st.addEventListener("pointercancel",up);
  // PC: ホイール=縦スクロール, Ctrl+ホイール=ズーム
  st.addEventListener("wheel",e=>{
    e.preventDefault();
    if(e.ctrlKey){
      const k=e.deltaY<0?1.1:0.9;
      const stR=st.getBoundingClientRect();
      view.tx=e.clientX-stR.left-((e.clientX-stR.left-view.tx)*k);
      view.ty=e.clientY-stR.top-((e.clientY-stR.top-view.ty)*k);
      view.scale*=k;
    }else{
      view.ty-=e.deltaY;
    }
    clampView(); applyView();
  },{passive:false});
}
function eraseAt(cx,cy){
  const [x,y]=toPaper(cx,cy);
  const r=16/view.scale+8;
  let hit=false;
  for(let i=cur.ink.length-1;i>=0;i--){
    const s=cur.ink[i];
    for(const p of s.pts){
      if(Math.hypot(p[0]-x,p[1]-y) < r+s.w/2){
        erased.push(s);
        cur.ink.splice(i,1);
        hit=true;
        break;
      }
    }
  }
  if(hit) renderInk();
}
function undo(){
  const a=undoStack.pop();
  if(!a){ toast("戻せる操作がありません"); return; }
  if(a.type==="add"){
    const i=cur.ink.indexOf(a.stroke);
    if(i>=0) cur.ink.splice(i,1);
  }else{
    cur.ink.push(...a.strokes);
  }
  renderInk(); scheduleSave();
}

/* ================= ツールバー ================= */
function renderToolbar(){
  const tb=$("toolbar");
  tb.innerHTML="";
  if(!editMode){ tb.style.display="none"; return; }
  tb.style.display="flex";
  for(const t of TOOLS){
    const b=document.createElement("button");
    b.className="tool"+(tool===t.id?" sel":"");
    b.innerHTML=`${t.icon}<small>${t.label}</small>`;
    b.onclick=()=>{tool=t.id; renderToolbar();};
    tb.appendChild(b);
  }
  const sep=document.createElement("div"); sep.className="tb-sep"; tb.appendChild(sep);
  const palette = tool==="marker" ? MARKER_COLORS : PEN_COLORS;
  const curColor = tool==="marker" ? markerColor : penColor;
  if(tool!=="eraser"){
    for(const c of palette){
      const b=document.createElement("button");
      b.className="swatch"+(curColor===c?" sel":"");
      b.style.background=c;
      b.onclick=()=>{ if(tool==="marker") markerColor=c; else penColor=c; renderToolbar(); };
      tb.appendChild(b);
    }
    const sep2=document.createElement("div"); sep2.className="tb-sep"; tb.appendChild(sep2);
  }
  const u=document.createElement("button");
  u.className="tool"; u.innerHTML="↩️<small>戻す</small>";
  u.onclick=undo;
  tb.appendChild(u);
  // 入力切替: ✍️=Apple Pencil専用(指はスクロール) / 👆=指でも描く
  const sepP=document.createElement("div"); sepP.className="tb-sep"; tb.appendChild(sepP);
  const m=document.createElement("button");
  m.className="tool"+(fingerDraws?"":" sel");
  m.innerHTML=fingerDraws?"👆<small>指OK</small>":"✍️<small>ペンのみ</small>";
  m.onclick=()=>{
    fingerDraws=!fingerDraws; pencilPrefSet=true;
    idbPut("meta",{key:"pencil", value:{fingerDraws}});
    renderToolbar();
    toast(fingerDraws?"指でも描けます(2本指で移動)":"Apple Pencilでのみ描画(指はスクロール)");
  };
  tb.appendChild(m);
}

/* ================= 曲画面 ================= */
function openSong(id){
  cur=songs.find(s=>s.id===id);
  if(!cur) return;
  migrate(cur);
  editMode=true; undoStack=[];
  $("homeScreen").classList.add("hidden");
  $("songScreen").classList.remove("hidden");
  $("songTitle").textContent=cur.title;
  updateModeToggle();
  renderToolbar();
  renderPaper();
  fitPaper();
  const h=$("zoomHint");
  h.textContent=fingerDraws?"1本指で書く / 2本指で移動・ピンチ":"ペンで書く / 指で移動・ピンチ";
  h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),2600);
}
async function closeSong(){
  await saveNow();
  cur=null;
  $("songScreen").classList.add("hidden");
  $("homeScreen").classList.remove("hidden");
  renderHome();
}
function updateModeToggle(){
  const b=$("modeToggle");
  b.textContent=editMode?"👁 ビュー":"✏️ 手書き";
  b.className="pillbtn "+(editMode?"off":"on");
}

/* ================= 曲追加・LRCLIB ================= */
function openAddModal(mode){
  addModalMode=mode;
  $("addModal").classList.remove("hidden");
  $("searchResults").innerHTML="";
  const lyr=$("lyricsInput").parentElement;
  if(mode==="new"){
    $("addTitle").textContent="曲を追加";
    $("inTitle").value=""; $("inArtist").value=""; $("lyricsInput").value="";
    $("fetchRow").style.display="flex"; lyr.style.display="block";
  }else if(mode==="relyrics"){
    $("addTitle").textContent="歌詞を編集し直す";
    $("inTitle").value=cur.title; $("inArtist").value=cur.artist||"";
    $("lyricsInput").value=cur.text||"";
    $("fetchRow").style.display="flex"; lyr.style.display="block";
  }else{
    $("addTitle").textContent="曲名・アーティストを変更";
    $("inTitle").value=cur.title; $("inArtist").value=cur.artist||"";
    $("fetchRow").style.display="none"; lyr.style.display="none";
  }
}
const closeAddModal=()=>$("addModal").classList.add("hidden");

async function searchLyrics(){
  const t=$("inTitle").value.trim(), a=$("inArtist").value.trim();
  if(!t){ toast("曲名を入れてね"); return; }
  const box=$("searchResults");
  box.innerHTML=`<div class="searchstatus">検索中…</div>`;
  try{
    const q=encodeURIComponent((t+" "+a).trim());
    const r=await fetch(`https://lrclib.net/api/search?q=${q}`);
    if(!r.ok) throw 0;
    const list=(await r.json()).filter(x=>x.plainLyrics);
    if(!list.length){
      box.innerHTML=`<div class="searchstatus">見つかりませんでした。「歌詞サイトで探す」からコピペしてね。</div>`;
      return;
    }
    box.innerHTML=`<div class="searchstatus">タップして選択:</div>`;
    list.slice(0,8).forEach(x=>{
      const d=document.createElement("div");
      d.className="result";
      d.innerHTML=`<div class="rt"></div><div class="ra"></div>`;
      d.querySelector(".rt").textContent=x.trackName;
      d.querySelector(".ra").textContent=(x.artistName||"")+(x.albumName?" / "+x.albumName:"");
      d.onclick=()=>{
        $("lyricsInput").value=x.plainLyrics;
        box.innerHTML=`<div class="searchstatus">✅ 歌詞を入れました。下で確認して保存してね。</div>`;
      };
      box.appendChild(d);
    });
  }catch(e){
    box.innerHTML=`<div class="searchstatus">検索に失敗しました(ネット接続を確認)。コピペでもOK。</div>`;
  }
}
function openLyricsSite(){
  const t=$("inTitle").value.trim(), a=$("inArtist").value.trim();
  window.open(`https://www.google.com/search?q=${encodeURIComponent((t+" "+a+" 歌詞").trim())}`,"_blank");
}
async function saveAddModal(){
  const t=$("inTitle").value.trim();
  if(!t){ toast("曲名を入れてね"); return; }
  const a=$("inArtist").value.trim();
  if(addModalMode==="new"){
    const ly=$("lyricsInput").value;
    if(!ly.trim()){ toast("歌詞が空だよ"); return; }
    const song={id:uid(), title:t, artist:a, createdAt:Date.now(), updatedAt:Date.now(), text:ly, ink:[]};
    songs.push(song);
    await idbPut("songs",song);
    closeAddModal(); renderHome();
    toast("曲を追加しました");
  }else if(addModalMode==="relyrics"){
    const ly=$("lyricsInput").value;
    if(!ly.trim()){ toast("歌詞が空だよ"); return; }
    cur.title=t; cur.artist=a; cur.text=ly;
    await saveNow();
    closeAddModal();
    $("songTitle").textContent=cur.title;
    renderPaper();
    toast("歌詞を更新しました");
  }else{
    cur.title=t; cur.artist=a;
    await saveNow();
    closeAddModal();
    $("songTitle").textContent=cur.title;
    toast("変更しました");
  }
}

/* ================= バックアップ ================= */
async function exportBackup(){
  const data={app:"utareno", version:2, exportedAt:new Date().toISOString(), songs};
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`歌練習ノート_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  $("homeMenu").classList.add("hidden");
  toast("書き出しました");
}
async function importBackup(file){
  try{
    const data=JSON.parse(await file.text());
    if(data.app!=="utareno"||!Array.isArray(data.songs)) throw 0;
    let added=0, updated=0;
    for(const raw of data.songs){
      const s=migrate(raw);
      const exist=songs.find(x=>x.id===s.id);
      if(exist){ Object.assign(exist,s); updated++; }
      else{ songs.push(s); added++; }
      await idbPut("songs",s);
    }
    renderHome();
    $("homeMenu").classList.add("hidden");
    toast(`読み込み完了(追加${added}・更新${updated})`);
  }catch(e){
    toast("読み込めないファイルです");
  }
}

/* ================= イベント ================= */
$("fab").onclick=()=>openAddModal("new");
$("addCancel").onclick=closeAddModal;
$("addSave").onclick=saveAddModal;
$("btnSearch").onclick=searchLyrics;
$("btnOpenSite").onclick=openLyricsSite;
$("backBtn").onclick=closeSong;
$("modeToggle").onclick=()=>{
  editMode=!editMode;
  updateModeToggle(); renderToolbar();
  toast(editMode?"手書きモード: 1本指で書く / 2本指で移動":"ビューモード: 1本指で移動");
};
$("homeMenuBtn").onclick=()=>$("homeMenu").classList.remove("hidden");
$("homeMenuClose").onclick=()=>$("homeMenu").classList.add("hidden");
$("miExport").onclick=exportBackup;
$("miImport").onclick=()=>$("importFile").click();
$("importFile").onchange=e=>{ if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value=""; };
$("miQR").onclick=async()=>{
  $("homeMenu").classList.add("hidden");
  $("qrModal").classList.remove("hidden");
  const body=$("qrBody");
  const publicUrl="https://fukufukurowl-lgtm.github.io/utareno/";
  let url=publicUrl;
  try{ const r=await fetch("/ip"); url=(await r.json()).url; }catch(e){}
  body.innerHTML=`<img width="200" height="200" alt="QR"
    src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}">
    <div style="margin-top:8px;font-size:14px;user-select:all;">${url}</div>`;
};
$("qrClose").onclick=()=>$("qrModal").classList.add("hidden");
$("songMenuBtn").onclick=()=>{
  $("songMenuTitle").textContent=cur.title;
  $("songMenu").classList.remove("hidden");
};
$("songMenuClose").onclick=()=>$("songMenu").classList.add("hidden");
$("miEditInfo").onclick=()=>{ $("songMenu").classList.add("hidden"); openAddModal("info"); };
$("miEditLyrics").onclick=()=>{
  $("songMenu").classList.add("hidden");
  openAddModal("relyrics");
};
$("miClearInk").onclick=async()=>{
  if(!confirm("この曲の手書きを全部消しますか?")) return;
  undoStack.push({type:"del", strokes:cur.ink.slice()});
  cur.ink=[];
  renderInk(); await saveNow();
  $("songMenu").classList.add("hidden");
  toast("消しました(↩️で戻せます)");
};
$("miDeleteSong").onclick=async()=>{
  if(!confirm(`「${cur.title}」を削除しますか?この操作は戻せません。`)) return;
  await idbDel("songs",cur.id);
  songs=songs.filter(s=>s.id!==cur.id);
  $("songMenu").classList.add("hidden");
  cur=null;
  $("songScreen").classList.add("hidden");
  $("homeScreen").classList.remove("hidden");
  renderHome();
  toast("削除しました");
};
document.querySelectorAll(".modal").forEach(m=>{
  m.addEventListener("click",e=>{ if(e.target===m) m.classList.add("hidden"); });
});
window.addEventListener("resize",()=>{ if(cur){ clampView(); applyView(); } });

/* ================= 起動 ================= */
(async function(){
  await openDB();
  songs=(await idbAll("songs")).map(migrate);
  const pc=await idbGet("meta","pencil");
  if(pc && pc.value){ fingerDraws=!!pc.value.fingerDraws; pencilPrefSet=true; }
  renderHome();
  initStage();
  if(navigator.storage && navigator.storage.persist) navigator.storage.persist();
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
})();
</script>
